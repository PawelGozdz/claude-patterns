# Stack defaults for nextjs-app (App Router, RSC)
#
# See _stack-defaults/README.md for schema details.
# Read by /orchestrate Phase 0.5a' for projects with stack_profile: nextjs-app
#
---
stack_profile: nextjs-app

always_include:
  # Universal conventions — always
  - cross-layer/conventions-pattern.md
  # RSC vs client component boundary is foundational for App Router
  - nextjs/server-client-components-pattern.md
  # Routing structure (route groups, parallel/intercepting routes)
  - nextjs/routing-proxy-pattern.md

trigger_includes:
  - keywords: [auth, session, login, jwt, middleware]
    include:
      - nextjs/auth-pattern.md

  - keywords: [form, action, server action, mutation]
    include:
      - nextjs/forms-actions-pattern.md

  - keywords: [fetch, data, swr, react-query, query]
    include:
      - nextjs/data-fetching-pattern.md

  - keywords: [css, style, tailwind, module, theme]
    include:
      - nextjs/styling-pattern.md

  - keywords: [test, jest, vitest, playwright, e2e]
    include:
      - nextjs/testing-pattern.md
      - testing/testing-pyramid-pattern.md
