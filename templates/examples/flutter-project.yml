# Flutter Clean Architecture Project Example
# Copy to: <flutter-project>/.claude/config/project.yml

project:
  name: MyFlutterApp
  description: "Cross-platform mobile app with Clean Architecture"
  stack_profile: flutter-clean-arch
  language: dart
  stack: "Flutter 3.x, Dart, Riverpod, Freezed, GoRouter, Dio"
  testing: "flutter_test, mocktail, golden_toolkit"
  state_management: "Riverpod 2.x with StateNotifier"
  platforms: "iOS, Android"

skills:
  - security
  - testing
  - quality
  - optimization
  - architecture
  - flutter

contexts:
  - name: auth
    status: production
    tests: 45
    notes: "Login, register, OAuth, biometric"
  - name: user-profile
    status: production
    tests: 32
    notes: "Profile management, settings, avatar"
  - name: feed
    status: in-progress
    tests: 18
    notes: "Infinite scroll, pull-to-refresh"

rules:
  - "NEVER import between features — use shared/ for cross-feature code"
  - "Domain/application layers: NO Flutter/infrastructure imports (pure Dart)"
  - "ref.watch() in build(), ref.read() in callbacks ONLY"
  - "ALL models use @freezed — entities, states, DTOs"
  - "ALL use cases return Either<Failure, T> — never throw exceptions"
  - "Polish-first localization (pl_PL primary, ARB files)"

cost:
  opus: "<25%"
  sonnet: "~55%"
  haiku: ">20%"

entry_points:
  orchestrate: "/o"
  scaffold: "/scaffold"
  progress: "/progress"
