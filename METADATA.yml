# Global Claude Patterns Repository - Metadata

version: "3.5.0"
created: "2026-02-05"
last_updated: "2026-05-07"
author: "LocalHero Team"
source_project: "LocalHero v3"
license: "MIT"

description: |
  Production-tested software patterns, universal agents, skills, a project
  management system, and three vendored skill toolkits (marketing 41,
  finance 84, legal 12) for Claude Code projects.
  Extracted from LocalHero (1355+ tests, 6 production contexts) and
  augmented with vendored marketing (coreyhaines31), finance (JoelLewis,
  MIT), and legal (evolsb MIT + 11 Apache 2.0 from lawvable per-skill).
  Legal ecosystem is license-fragmented — 30 AGPL skills cataloged in
  EXTERNAL.md, never vendored (AGPL contamination protection).
  Uses native filesystem symlinks for zero-duplication sharing.

vendored_dependencies:
  - name: "marketingskills"
    upstream: "https://github.com/coreyhaines31/marketingskills"
    author: "Corey Haines"
    license: "MIT"
    version_pinned: "1.9.0"  # plugin.json version at last sync
    location:
      - "skills/marketing/"
      - "tools/marketing/"
    sync_script: "scripts/sync-marketing-skills.sh"
    upstream_marker: "skills/marketing/UPSTREAM_VERSION"

  - name: "finance_skills"
    upstream: "https://github.com/JoelLewis/finance_skills"
    author: "Joel Lewis (joel@eleazar.dev)"
    license: "MIT"
    version_pinned: "1.0.0"  # marketplace.json version at last sync
    location:
      - "skills/finance/"
      - "tests/finance-evals/"
    sync_script: "scripts/sync-finance-skills.sh"
    upstream_marker: "skills/finance/UPSTREAM_VERSION"
    structure: "plugin-aware"  # 7 plugins with dependency graph (see skills/finance/PLUGINS.md)

  - name: "claude-legal-skill"  # vendored as one of the legal sources
    upstream: "https://github.com/evolsb/claude-legal-skill"
    author: "Christopher Sheehan (evolsb)"
    license: "MIT"
    version_pinned: "3.0.0"
    location:
      - "skills/legal/contract-review/"
    sync_script: "scripts/sync-legal-skills.sh"
    upstream_marker: "skills/legal/UPSTREAM_VERSION"

  - name: "awesome-legal-skills (filtered)"
    upstream: "https://github.com/lawvable/awesome-legal-skills"
    repo_license: "CC BY-NC-ND 4.0"  # per-repo, NOT applied to vendored skills
    author: "Various — see per-skill metadata.author"
    license: "Apache-2.0"  # only Apache-2.0 / MIT skills vendored from this source
    vendored_skills_count: 11
    cataloged_external_count: 30  # AGPL-3.0 + proprietary, see skills/legal/EXTERNAL.md
    location:
      - "skills/legal/<skill>/"  # 11 skills, see skills/legal/UPSTREAM_VERSION
    sync_script: "scripts/sync-legal-skills.sh"
    upstream_marker: "skills/legal/UPSTREAM_VERSION"
    license_drift_protection: "scripts/sync-legal-skills.sh --verify-licenses"
    structure: "license-fragmented"  # see patterns/legal/external-skills-catalog-pattern.md

