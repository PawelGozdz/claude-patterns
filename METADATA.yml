  versioning: "semantic"

notes: |
  - v1.0.0: Initial extraction from LocalHero (13 DDD patterns)
  - v2.0.0: Added agents, skills, hooks, stack presets
  - v3.0.0: Native .claude/rules/, @import, .mcp.json, stack-specific hooks
  - v3.1.0: Project Management System (tech-lead + product-owner agents,
    5 PM skills, pm-task-check hook, project-orchestration template)
  - v3.3.0: Marketing system — 41 marketing skills vendored from
    coreyhaines31/marketingskills (MIT), marketing-strategist agent,
    /marketing command, product-marketing-context pattern + template,
    tools/marketing/ (60 CLI refs + 75 integration guides),
    sync-marketing-skills.sh script.
  - v3.4.0: Finance system — 84 finance skills vendored from
    JoelLewis/finance_skills (MIT) with plugin-aware structure (7 plugins
    + dependency graph), finance-strategist agent with data-driven hedged
    voice and contextual disclaimer system (6 categories — not boilerplate),
    /finance command, layered-knowledge + regulatory-disclaimer patterns,
    tests/finance-evals/ vendored eval framework, sync-finance-skills.sh.
    @product-owner now consults marketing + finance strategists during
    strategic work (roadmaps, sprints, milestones) — not during code
    implementation.
