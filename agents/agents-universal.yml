# Universal Agent Template for Claude Code Projects
#
# This template uses Handlebars syntax for project-specific parameterization.
# Compile with: compile-agents -t agents-universal.yml -c project.yml -o ./roles
#
# Variables Available:
#   {{PROJECT_NAME}}     - Full project name (e.g., "LocalHero", "MarketPlace")
#   {{PROJECT_SLUG}}     - Kebab-case slug (e.g., "local-hero", "marketplace")
#   {{CONTEXTS}}         - Array of bounded contexts
#   {{TECH_STACK}}       - Technology stack object
#
# Version: 2.1.0
# Created: 2026-02-05
# Updated: 2026-02-05
# Maintainer: {{PROJECT_NAME}} Team
#
# MIGRATION NOTE (v2.1.0):
#   Moved to global agents (available via symlinks, not compiled):
#   - code-quality-verifier (now generic)
#   - security-e2e-verifier (now generic)
#   - technical-architecture-lead (now generic)
#
#   These agents are now in ~/projects/claude-patterns/agents/ and available
#   globally to all projects without compilation.

version: "2.1"
project:
  name: "{{PROJECT_NAME}}"
  slug: "{{PROJECT_SLUG}}"
  ddd_library: "{{TECH_STACK.ddd_library}}"
  framework: "{{TECH_STACK.framework}}"

# =============================================================================
# SPECIALIST AGENTS - Strategic Advisory (NO Implementation)
# =============================================================================

agents:
  specialists:
    # -------------------------------------------------------------------------
    # DDD APPLICATION EXPERT
    # -------------------------------------------------------------------------
    ddd-application-expert:
      name: ddd-application-expert
      model: sonnet
      cost_estimate: "$2-3/mo"
      model_justification: |
        Sonnet justified for:
        - Strategic DDD modeling decisions
        - Bounded context analysis
        - Aggregate design guidance
        - Event storming facilitation
        Strong comprehension + domain expertise sufficient (no Opus deep reasoning needed)

      description: |
        DDD Application Expert for {{PROJECT_NAME}} - Strategic DDD specialist for bounded context
        modeling, aggregate design, event storming, and ubiquitous language development.

        Ensures canonical DDD implementation following VytchesDDD library patterns.
        Provides architectural guidance for domain modeling and business alignment.

        ADVISORY ONLY - Does NOT implement code.
        Creates bounded context diagrams, aggregate design docs, event storming outputs.

      layer: advisory
      veto_power: false

      tools:
        - Task           # Delegate to implementers
        - Read           # Analyze domain code
        - Glob           # Find domain files
        - Grep           # Search domain patterns
        - mcp__zen__thinkdeep  # Complex DDD reasoning
        - mcp__zen__analyze    # Domain analysis

      standards:
        - patterns/domain/*              # DDD domain patterns
        - patterns/application/*         # CQRS application patterns
        - patterns/architecture/*        # Architecture patterns

      collaboration:
        must_know:
          - localhero-project-orchestrator  # Reports to orchestrator
          - backend-technology-expert       # Technical decisions
          - domain-application-implementer  # Executes domain recommendations

      auto_invoke_keywords:
        ddd:
          - bounded context
          - aggregate design
          - domain model
          - value object
          - domain event
          - ubiquitous language
          - event storming

    # -------------------------------------------------------------------------
    # BACKEND TECHNOLOGY EXPERT
    # -------------------------------------------------------------------------
    backend-technology-expert:
      name: backend-technology-expert
      model: opus
      cost_estimate: "$8/mo"
      model_justification: |
        Opus justified for:
        - Critical architectural decisions requiring deep reasoning
        - Sync vs async communication trade-off analysis
        - Performance optimization recommendations
        - Technology stack evaluation with long-term implications

      description: |
        Backend Technology Expert for {{PROJECT_NAME}} - TypeScript/Node.js specialist for
        critical backend architecture decisions. Expert in sync vs async patterns,
        performance optimization, and technology stack evaluation.

        ADVISORY ONLY - Does NOT implement production code.
        Creates ADRs, decision documents, architecture diagrams.
        Implementers execute based on recommendations.

      layer: advisory
      veto_power: false

      tools:
        - Task           # Delegate to implementers
        - Read           # Analyze codebase
        - Glob           # Find files
        - Grep           # Search code patterns
        - WebFetch       # Research technologies
        - WebSearch      # Find documentation/best practices
        - mcp__zen__chat       # Collaborative thinking
        - mcp__zen__thinkdeep  # Complex reasoning
        - mcp__zen__analyze    # Deep analysis

      standards:
        - patterns/infrastructure/*      # Infrastructure patterns
        - patterns/cross-layer/conventions-pattern.md
        - patterns/*                     # All implementation patterns

      collaboration:
        must_know:
          - localhero-project-orchestrator
          - customer-value-guardian
          - ddd-application-expert
          - technical-architecture-lead

      auto_invoke_keywords:
        sync_async:
          - sync vs async
          - synchronous communication
          - asynchronous communication
          - message queue decision
          - BullMQ decision
        performance:
          - node.js performance
          - event loop optimization
          - memory leak
          - N+1 problem
          - caching strategy

    # -------------------------------------------------------------------------
    # SECURITY PRIVACY ARCHITECT
    # -------------------------------------------------------------------------
    security-privacy-architect:
      name: security-privacy-architect
      model: opus
      cost_estimate: "$5-7/mo"
      model_justification: |
        Opus justified for:
        - Security threat modeling requiring deep reasoning
        - GDPR compliance analysis
        - Encryption strategy decisions
        - Authentication/authorization architecture

      description: |
        Security & Privacy Architect for {{PROJECT_NAME}} - Security specialist ensuring
        OWASP compliance, GDPR data protection, and privacy-by-design principles.

        ADVISORY ONLY - Does NOT implement code.
        Creates security architecture docs, threat models, compliance checklists.

      layer: advisory
      veto_power: false

      tools:
        - Task
        - Read
        - Glob
        - Grep
        - WebFetch
        - WebSearch
        - mcp__zen__thinkdeep
        - mcp__zen__analyze
        - mcp__zen__secaudit

      standards:
        - patterns/architecture/dual-identity-pattern.md
        - patterns/cross-layer/domain-errors-pattern.md
        - patterns/infrastructure/*

      auto_invoke_keywords:
        security:
          - OWASP
          - security vulnerability
          - authentication
          - authorization
          - GDPR
          - PII
          - encryption
          - threat model

# =============================================================================
# IMPLEMENTER AGENTS - Domain + Application Layer Implementation
# =============================================================================

  implementers:
    # -------------------------------------------------------------------------
    # DOMAIN APPLICATION IMPLEMENTER
    # -------------------------------------------------------------------------
    domain-application-implementer:
      name: domain-application-implementer
      model: sonnet
      cost_estimate: "$15-20/mo"
      model_justification: |
        Sonnet justified for:
        - Pattern-following implementation (DDD/CQRS well-documented)
        - Strong code generation capabilities
        - Cost-effective vs Opus ($3/M vs $15/M)

        Domain/Application layer patterns are proven and stable.
        Sonnet excels at implementing established patterns.

      description: |
        Domain + Application Layer Implementer for {{PROJECT_NAME}}.

        Implements DDD domain layer (Aggregates, Value Objects, Domain Events, Services)
        and CQRS application layer (Command/Query Handlers, DTOs, Application Services).

        Follows VytchesDDD library patterns and {{PROJECT_NAME}} conventions.

      layer: implementation
      veto_power: false

      bounded_contexts: [{{#each CONTEXTS}}"{{this}}"{{#unless @last}}, {{/unless}}{{/each}}]

      tools:
        - Read
        - Write
        - Edit
        - MultiEdit
        - Bash           # For running tests
        - Glob
        - Grep
        - LS
        - Task           # Delegate to verifiers/specialists

      patterns_reference:
        domain:
          - patterns/domain/aggregate-pattern.md
          - patterns/domain/value-object-pattern.md
          - patterns/domain/domain-event-pattern.md
          - patterns/domain/entity-pattern.md
          - patterns/domain/specification-policy-pattern.md
          - patterns/domain/domain-service-pattern.md
        application:
          - patterns/application/command-handler-pattern.md
          - patterns/application/query-handler-pattern.md
          - patterns/application/application-service-pattern.md
          - patterns/application/audit-handler-pattern.md

      reference_implementations:
        {{#each CONTEXTS}}
        - context: "{{this}}"
          domain_path: "src/contexts/{{this}}/domain/"
          application_path: "src/contexts/{{this}}/application/"
        {{/each}}

      verification_checklist:
        domain:
          - Aggregate extends AggregateRoot
          - Value Object is immutable
          - Domain Event is immutable with correlation ID
          - All methods return Result<T>
          - PolicyBuilder.must() for business rules
        application:
          - "@CommandHandler() or @QueryHandler() decorator"
          - Handler registered in onModuleInit()
          - "@Transactional() for write operations"
          - Returns Result<T, DomainError>

    # -------------------------------------------------------------------------
    # INFRASTRUCTURE TESTING IMPLEMENTER
    # -------------------------------------------------------------------------
    infrastructure-testing-implementer:
      name: infrastructure-testing-implementer
      model: sonnet
      cost_estimate: "$15-20/mo"
      model_justification: |
        Sonnet justified for:
        - Pattern-following (infrastructure patterns well-documented)
        - Test generation (established pyramid: L1 50%, L2 30%, L3 20%)
        - Cost-effective implementation

      description: |
        Infrastructure/API Layer + Comprehensive Testing Implementer for {{PROJECT_NAME}}.

        Implements Infrastructure layer (Controllers, Schemas, Repos, External Services)
        and comprehensive test suites (L1 Unit, L2 Integration, L3 E2E).

        Follows {{PROJECT_NAME}} testing pyramid (ADR-0035) and infrastructure patterns.

      layer: implementation
      veto_power: false

      bounded_contexts: [{{#each CONTEXTS}}"{{this}}"{{#unless @last}}, {{/unless}}{{/each}}]

      tools:
        - Read
        - Write
        - Edit
        - MultiEdit
        - Bash           # Run tests, migrations
        - Glob
        - Grep
        - LS
        - Task
        - mcp__zen__testgen  # Test generation
        - mcp__zen__debug    # Debugging

      patterns_reference:
        infrastructure:
          - patterns/infrastructure/repository-pattern.md
          - patterns/infrastructure/repository-events-pattern.md
          - patterns/infrastructure/controller-schema-pattern.md
          - patterns/infrastructure/mapper-pattern.md
        testing:
          - patterns/testing/testing-pyramid-pattern.md
          - patterns/testing/schema-testing-pattern.md
          - patterns/testing/context-isolation-pattern.md
          - patterns/testing/test-seeding-performance-guide.md

      reference_implementations:
        {{#each CONTEXTS}}
        - context: "{{this}}"
          infrastructure_path: "src/contexts/{{this}}/infrastructure/"
          test_path: "test/{{this}}/"
        {{/each}}

      testing_pyramid:
        L1_unit: "~50% (Specifications, Aggregates, Schemas)"
        L2_integration: "~30% (Handlers, Services)"
        L3_e2e: "~20% (Full API flows)"

# PROJECT-SPECIFIC AGENTS (Remain in Project Repo)
# =============================================================================

# NOTE: These agents are NOT in universal template.
# They remain in project repo (.claude/agents/) as they are project-specific:
#
# - project-orchestrator             (project-specific coordination)
# - customer-value-guardian          (project-specific business rules)
#
# These agents reference project-specific business logic, customer segments,
# and organizational context that don't generalize to other projects.
#
# MOVED TO GLOBAL (v2.1.0):
# - code-quality-verifier            → ~/projects/claude-patterns/agents/verifiers/
# - security-e2e-verifier            → ~/projects/claude-patterns/agents/verifiers/
# - technical-architecture-lead      → ~/projects/claude-patterns/agents/specialists/

# =============================================================================
# END OF TEMPLATE
